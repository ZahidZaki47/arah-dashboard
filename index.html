<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ARAH — Portfolio</title>
<style>
  :root{--bg:#0d1117;--card:#161b22;--line:#21262d;--fg:#e6edf3;--dim:#8b949e;
        --green:#3fb950;--red:#f85149;--gold:#d4a72c;--blue:#58a6ff}
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:var(--bg);color:var(--fg);font-family:-apple-system,"Segoe UI",Roboto,sans-serif;
       min-height:100vh;display:flex;justify-content:center;padding:16px}
  .wrap{width:100%;max-width:440px}
  h1{font-size:22px;letter-spacing:4px;text-align:center;margin:8px 0 2px}
  .sub{color:var(--dim);font-size:12px;text-align:center;margin-bottom:16px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:12px;
        padding:16px;margin-bottom:12px}
  .equity{font-size:36px;font-weight:700;text-align:center}
  .pnl{font-size:16px;text-align:center;margin-top:4px}
  .pos{color:var(--green)} .neg{color:var(--red)}
  .label{color:var(--dim);font-size:11px;text-transform:uppercase;letter-spacing:1px;
         margin-bottom:8px}
  .bar-row{display:flex;align-items:center;gap:8px;margin:6px 0;font-size:13px}
  .bar-name{width:52px;color:var(--dim)}
  .bar-track{flex:1;height:18px;background:var(--bg);border-radius:4px;overflow:hidden}
  .bar-fill{height:100%;border-radius:4px;transition:width .5s}
  .bar-pct{width:48px;text-align:right;font-variant-numeric:tabular-nums}
  canvas{width:100%;height:80px}
  .meta{display:flex;justify-content:space-between;color:var(--dim);font-size:11px;margin-top:6px}
  .err{color:var(--red);text-align:center;padding:20px}
</style>
</head>
<body>
<div class="wrap">
  <h1>A R A H</h1>
  <div class="sub">Portfolio Halal — Paper Trading</div>

  <div class="card">
    <div class="equity" id="equity">—</div>
    <div class="pnl" id="pnl">memuatkan…</div>
  </div>

  <div class="card">
    <div class="label">Alokasi Semasa</div>
    <div id="alloc"></div>
  </div>

  <div class="card">
    <div class="label">Equity (1 tahun)</div>
    <canvas id="spark" width="800" height="160"></canvas>
    <div class="meta"><span id="bar-date"></span><span id="updated"></span></div>
  </div>
</div>

<script>
const COLORS = {BTC:"#f7931a", ETH:"#627eea", PAXG:"#d4a72c", USDT:"#3fb950"};

async function load(){
  try{
    const r = await fetch("./arah_state.json?t=" + Date.now());
    const s = await r.json();

    const eq = document.getElementById("equity");
    eq.textContent = "$" + s.equity.toLocaleString("en-US",{minimumFractionDigits:2});

    const pnl = document.getElementById("pnl");
    const up = s.pnl_usd >= 0;
    pnl.textContent = (up?"+":"") + "$" + s.pnl_usd.toLocaleString("en-US",{minimumFractionDigits:2}) +
                      "  (" + (up?"+":"") + s.pnl_pct.toFixed(2) + "%)";
    pnl.className = "pnl " + (up?"pos":"neg");

    const alloc = document.getElementById("alloc");
    alloc.innerHTML = "";
    for (const [name, pct] of Object.entries(s.allocation_pct)){
      if (pct < 0.5) continue;
      const row = document.createElement("div");
      row.className = "bar-row";
      row.innerHTML = `<span class="bar-name">${name}</span>
        <div class="bar-track"><div class="bar-fill" style="width:${pct}%;
          background:${COLORS[name]||"#8b949e"}"></div></div>
        <span class="bar-pct">${pct.toFixed(1)}%</span>`;
      alloc.appendChild(row);
    }

    const hist = s.history || [];
    if (hist.length > 1){
      const cv = document.getElementById("spark"), ctx = cv.getContext("2d");
      const vals = hist.map(h=>h.equity);
      const min = Math.min(...vals), max = Math.max(...vals), pad = (max-min)||1;
      ctx.clearRect(0,0,cv.width,cv.height);
      ctx.beginPath();
      vals.forEach((v,i)=>{
        const x = i/(vals.length-1)*cv.width;
        const y = cv.height-8 - (v-min)/pad*(cv.height-16);
        i? ctx.lineTo(x,y) : ctx.moveTo(x,y);
      });
      ctx.strokeStyle = vals[vals.length-1] >= vals[0] ? "#3fb950" : "#f85149";
      ctx.lineWidth = 2.5; ctx.stroke();
    }

    document.getElementById("bar-date").textContent = "Data: " + s.bar_date;
    document.getElementById("updated").textContent =
      "Kemaskini: " + new Date(s.updated_at).toLocaleString("ms-MY",{timeZone:"Asia/Kuala_Lumpur"});
  }catch(e){
    document.getElementById("pnl").innerHTML = "<span class='err'>Gagal memuatkan data</span>";
  }
}
load();
setInterval(load, 60000);
</script>
</body>
</html>
